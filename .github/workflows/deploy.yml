name: Deploy to CyberPanel VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Execute deployment commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Navigate to the website document root
            cd /home/prayaghospital.in/public_html
            
            # Trust the directory for the root user
            git config --global --add safe.directory /home/prayaghospital.in/public_html
            
            # Force pull the latest changes from the main branch
            git fetch origin
            git reset --hard origin/main
            
            # Fix permissions for CyberPanel (LiteSpeed)
            chown -R nobody:nobody .
            chmod -R 755 .
