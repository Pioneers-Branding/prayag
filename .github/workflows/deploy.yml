name: Deploy to CyberPanel VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan 72.61.224.90 >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          git remote add vps ssh://root@72.61.224.90/home/prayaghospital.in/repo.git
          git push -f vps main
